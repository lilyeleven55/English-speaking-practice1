<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI 英语口语陪练 | English Speaking Coach</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <div class="app">
        <!-- 侧边栏 - 由 JS 动态生成 -->
        
        <!-- 自定义场景模态框 -->
        <div id="custom-scenario-modal" class="modal" style="display: none;">
            <div class="modal-content">
                <div class="modal-header">
                    <h2>✨ 创建自定义场景</h2>
                    <button class="close-modal">&times;</button>
                </div>
                <div class="modal-body">
                    <div class="form-group">
                        <label for="scenario-name">场景名称</label>
                        <input type="text" id="scenario-name" placeholder="例如：咖啡馆聊天">
                    </div>
                    <div class="form-group">
                        <label for="scenario-persona">AI角色设定</label>
                        <input type="text" id="scenario-persona" placeholder="例如：友好的咖啡师">
                    </div>
                    <div class="form-group">
                        <label for="scenario-opening">AI开场白</label>
                        <textarea id="scenario-opening" rows="2" placeholder="例如：欢迎来到我们的咖啡馆！今天想喝点什么？"></textarea>
                    </div>
                    <div class="form-group">
                        <label for="scenario-description">场景描述</label>
                        <textarea id="scenario-description" rows="2" placeholder="例如：在咖啡馆里进行日常对话练习"></textarea>
                    </div>
                </div>
                <div class="modal-footer">
                    <button class="btn-cancel">取消</button>
                    <button class="btn-confirm">开始对话</button>
                </div>
            </div>
        </div>
        
        <!-- 主内容区 -->
        <div class="main-content">
            <!-- 顶部标题栏 -->
            <header class="header">
                <div class="header-left">
                    <span class="logo">🎙️</span>
                    <div>
                        <h1>AI 英语口语陪练</h1>
                        <p class="subtitle">English Speaking Coach</p>
                    </div>
                </div>
                <div id="streak-display" class="streak-display">
                    <span id="header-streak-badge" class="streak-badge">🔥 0天</span>
                </div>
                <button id="btn-reset" class="btn-reset" title="清空对话">↺ 重置</button>
            </header>

            <!-- 场景切换区 -->
            <section class="scenarios" id="scenario-bar">
                <!-- 由 JS 动态填充 -->
            </section>
            <section class="custom-scenario-section">
                <button id="btn-custom-scenario" class="custom-scenario-btn">✨ 自定义场景</button>
            </section>

            <!-- 聊天消息区 -->
            <main class="chat-area" id="chat-area">
                <div class="welcome-card" id="welcome-card">
                    <h2>👋 Welcome!</h2>
                    <p>选择一个场景，用英文和 AI 陪练对话吧。</p>
                    <p class="hint">AI 会自然回应你的句子，并给出语法纠错建议。</p>
                </div>
            </main>

            <!-- 输入区 -->
            <footer class="input-area">
                <div class="input-wrapper">
                    <textarea
                        id="user-input"
                        placeholder="Type your English here... (按 Enter 发送，Shift+Enter 换行)"
                        rows="1"
                        autofocus
                    ></textarea>
                    <button id="btn-send" class="btn-send" title="发送">
                        <svg viewBox="0 0 24 24" width="20" height="20" fill="currentColor">
                            <path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/>
                        </svg>
                    </button>
                </div>
                <p class="input-hint">试试故意写错语法，看看 AI 如何纠错和鼓励你 ✨</p>
            </footer>
        </div>
    </div>

    <script src="{{ url_for('static', filename='app.js') }}"></script>
</body>
</html>
